# fauria/vsftpd の標準 conf に追記する SSL(明示的FTPS)設定。
# 接続側(WinSCP)は FtpSecure=Explicit で接続するためサーバ側で SSL を有効化する。
ssl_enable=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO
require_ssl_reuse=NO
# クライアント証明書を要求しない (デフォルトYESだと WinSCP が「クライアント証明書が必要」
# と解釈して接続失敗するため)
ssl_request_cert=NO
# 弱い 1024bit DH 鍵交換(dh key too small)を避けるため ECDHE/RSA 系のみ使用
ssl_ciphers=ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-GCM-SHA256:AES256-SHA:AES128-SHA
rsa_cert_file=/etc/vsftpd/vsftpd.pem
rsa_private_key_file=/etc/vsftpd/vsftpd.pem
