services:
  local-ftp:
    image: fauria/vsftpd
    container_name: local-ftp-server
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: localdev
      FTP_PASS: localdev-pass
    volumes:
      - ./local-data/ftp-root:/home/vsftpd/localdev
      - ./docker/vsftpd.conf:/etc/vsftpd/vsftpd.conf:ro
